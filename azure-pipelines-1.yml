# frontend-pipeline.yml
trigger:
  branches:
    include:
    - deploy
  paths:
    include:
    - frontend/* # Only trigger for Vite/frontend changes
    exclude:
    - backend/*  # Ignore .NET/backend changes

pool:
  vmImage: 'windows-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '22.x' # Change from 20.x to 22.x
  displayName: 'Install Node.js 22'

- script: |
    cd frontend
    npm install
    npm run build
  displayName: 'Build Vite Project'
  
# 1. Zip the dist folder so MSDeploy can handle it
- task: ArchiveFiles@2
  displayName: 'Zip Frontend Dist'
  inputs:
    rootFolderOrFile: 'frontend/dist'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
    replaceExistingArchive: true

# 2. Deploy using the zip file
- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy Frontend to IIS'
  inputs:
    WebSiteName: 'TallyJv4-UAT'
    Package: '$(Build.ArtifactStagingDirectory)/frontend.zip' # Point to the zip
    TakeAppOfflineFlag: true

# Debug step to see the frontend workspace if it fails
- task: PublishPipelineArtifact@1
  condition: always()
  inputs:
    targetPath: '$(Pipeline.Workspace)'
    artifact: 'FrontendDebugWorkspace'

