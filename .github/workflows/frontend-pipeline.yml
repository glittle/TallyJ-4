name: Frontend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - "!backend/**"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: [self-hosted, windows, WIN16A]
    environment: Win16a
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Npm Install
        run: npm install
        working-directory: frontend

      - name: Vite Build
        run: npx vite build
        working-directory: frontend

      - name: Deploy to wwwroot-uat
        shell: pwsh
        run: |
          $dest = "${{ vars.IIS_FRONTEND_UAT_PATH }}"
          Set-Content -Path "$dest\app_offline.htm" -Value "Deploying..."
          robocopy "${{ github.workspace }}\frontend\dist" "$dest" /MIR /NFL /NDL /NJH /NJS /XF app_offline.htm
          if ($LASTEXITCODE -le 7) { Remove-Item "$dest\app_offline.htm" -ErrorAction SilentlyContinue; exit 0 }

      - name: Deploy to wwwroot-prod
        shell: pwsh
        run: |
          $dest = "${{ vars.IIS_FRONTEND_PROD_PATH }}"
          robocopy "${{ github.workspace }}\frontend\dist" "$dest" /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { exit 0 }
