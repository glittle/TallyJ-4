name: Backend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - Backend.Tests/**
      - "!frontend/**"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: [self-hosted, windows, WIN16A]
    environment: Win16a
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: dotnet test "**/*Tests/*.csproj" --configuration Release --verbosity quiet

      - name: Publish Web Project
        shell: pwsh
        run: |
          dotnet publish backend/Backend.csproj `
            --configuration Release `
            --output "${{ github.workspace }}\publish_output"

      - name: Take App Offline
        shell: pwsh
        run: |
          $appPath = "${{ vars.IIS_BACKEND_PATH }}"
          Set-Content -Path "$appPath\app_offline.htm" -Value "Deploying..."

      - name: Deploy to IIS
        shell: pwsh
        run: |
          $appPath = "${{ vars.IIS_BACKEND_PATH }}"
          robocopy "${{ github.workspace }}\publish_output" "$appPath" /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { exit 0 }

      - name: Bring App Online
        if: always()
        shell: pwsh
        run: |
          $appPath = "${{ vars.IIS_BACKEND_PATH }}"
          $offlineFile = "$appPath\app_offline.htm"
          if (Test-Path $offlineFile) { Remove-Item $offlineFile }
