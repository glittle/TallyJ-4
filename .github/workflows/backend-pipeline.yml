name: Backend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - Backend.Tests/**
      - "!frontend/**"

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: global.json

      - name: Run Unit Tests
        run: dotnet test "**/*Tests/*.csproj" --configuration Release --verbosity quiet

      - name: Package Web Project
        run: >
          dotnet publish backend/Backend.csproj
          --configuration Release
          --output "${{ github.workspace }}\artifact_staging"

      - name: Zip Published Output
        shell: pwsh
        run: >
          Compress-Archive
          -Path "${{ github.workspace }}\artifact_staging\*"
          -DestinationPath "${{ github.workspace }}\Backend.zip"

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend_pkg
          path: "${{ github.workspace }}\\Backend.zip"

  deploy:
    name: Deploy to IIS
    runs-on: [self-hosted, windows, WIN16A]
    needs: build
    environment: Win16a
    permissions: {}

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend_pkg
          path: "${{ github.workspace }}\\backend_pkg"

      - name: Deploy to IIS (TallyJv4-UAT)
        shell: pwsh
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          & $msdeploy `
            -verb:sync `
            "-source:package=${{ github.workspace }}\backend_pkg\Backend.zip" `
            "-dest:iisApp=TallyJv4-UAT" `
            -enableRule:AppOffline `
            -allowUntrusted
