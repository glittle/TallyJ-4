# azure-front-end-pipeline.yml
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**
      - version.json
    exclude:
      - backend/**

pr: none

jobs:
  - job: Build
    pool:
      vmImage: "windows-latest"
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: "22.x"
        displayName: "Install Node.js 22"

      - script: npm install
        displayName: "Npm Install"
        workingDirectory: "frontend"

      # --- BUILD ---
      # Use "npm run build" (not bare "npx vite build") because it runs merge-locales first.
      # The bundled locale files (gitignored) are required to emit the locale-*.js chunks used
      # for dynamic language switching on the landing page (and elsewhere). Without them,
      # non-English locales have no resources and no network fetches occur on flag click.
      - script: npm run build
        displayName: "Build (merge-locales + vite build)"
        workingDirectory: "frontend"

      - task: ArchiveFiles@2
        displayName: "Zip Dist"
        inputs:
          rootFolderOrFile: "frontend/dist"
          includeRootFolder: false
          archiveType: "zip"
          archiveFile: "$(Build.ArtifactStagingDirectory)/frontend.zip"

      # Publish zip
      - publish: $(Build.ArtifactStagingDirectory)
        artifact: frontend_pkgs

  - deployment: DeployToIIS
    dependsOn: Build
    environment:
      name: "Win16a"
      resourceName: "WIN16A"
      resourceType: virtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: frontend_pkgs

            # Deploy to wwwroot
            - task: IISWebAppDeploymentOnMachineGroup@0
              displayName: "Deploy to wwwroot"
              inputs:
                WebSiteName: "TallyJv4-UAT"
                Package: "$(Pipeline.Workspace)/frontend_pkgs/frontend.zip"
                TakeAppOfflineFlag: true
                VirtualApplication: "wwwroot"
