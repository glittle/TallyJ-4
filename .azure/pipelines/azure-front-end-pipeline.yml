# frontend-pipeline.yml
trigger:
  branches:
    include:
      - deploy
    exclude:
      - main # Explicitly ignore main
  paths:
    include:
      - frontend/**
    exclude:
      - backend/**

# 2. PR Trigger: Explicitly disabled to stop runs on PR creation/updates
pr: none

jobs:
- job: Build

  pool:
    vmImage: "windows-latest"

  steps:
    - task: NodeTool@0
      inputs:
        versionSpec: "22.x"
      displayName: "Install Node.js 22"

    - script: npm install
      displayName: "Npm Install"
      workingDirectory: "frontend" # Sets the context for this script

    - script: npm run build
      displayName: "Vite Build"
      workingDirectory: "frontend" # Sets the context for this script

    - task: ArchiveFiles@2
      displayName: "Zip Frontend Dist"
      inputs:
        # Since ArchiveFiles is a Task, we point directly to the path
        rootFolderOrFile: "frontend/dist"
        includeRootFolder: false
        archiveType: "zip"
        archiveFile: "$(Build.ArtifactStagingDirectory)/frontend.zip"
        replaceExistingArchive: true
        
    - publish: $(Build.ArtifactStagingDirectory)/frontend.zip
      artifact: frontend_pkg

    - task: PublishPipelineArtifact@1
      displayName: "Debug: Check Workspace (Ignoring node_modules)"
      condition: always()
      inputs:
        targetPath: "$(Build.SourcesDirectory)" # Only captures your code
        artifact: "FrontendSourceDebug"
        publishLocation: "pipeline"


- deployment: DeployToIIS
  dependsOn: Build
  environment: 
    name: 'Win16a' # This name MUST match your Environment name in DevOps
    resourceName: 'WIN16A'
    resourceType: virtualMachine
  strategy:
    runOnce:
      deploy:
        steps:
        # Download the zip we just built
        - download: current
          artifact: frontend_pkg
        - task: IISWebAppDeploymentOnMachineGroup@0
          inputs:
            WebSiteName: "TallyJv4-UAT"
            Package: "$(Pipeline.Workspace)/frontend_pkg/frontend.zip"
            TakeAppOfflineFlag: true

