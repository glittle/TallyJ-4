trigger:
  branches:
    include: [deploy]
    exclude: [main]
  paths:
    include: [backend/**, Backend.Tests/**] # Include both for triggers
    exclude: [frontend/**]

pr: none

pool:
  vmImage: "windows-latest"

variables:
  buildConfiguration: "Release"

jobs:
  - job: Build
    steps:
      - task: UseDotNet@2
        displayName: "Install .NET SDK from global.json"
        inputs:
          packageType: "sdk"
          useGlobalJson: true
          workingDirectory: "$(Build.SourcesDirectory)"

      # 1. Run Tests (Updated path to find Backend.Tests at the root)
      - task: DotNetCoreCLI@2
        displayName: "Run Unit Tests"
        inputs:
          command: "test"
          projects: "**/*Tests/*.csproj" # Finds any .csproj in a folder ending in 'Tests'
          arguments: "--configuration $(buildConfiguration) --verbosity quiet"

      # 2. Package Web Project
      - task: DotNetCoreCLI@2
        displayName: "Package Web Project"
        inputs:
          command: "publish"
          projects: "backend/Backend.csproj" # Adjust if your .csproj is deeper like 'backend/Backend/Backend.csproj'
          arguments: '--configuration $(buildConfiguration) --output "$(Build.ArtifactStagingDirectory)"'
          zipAfterPublish: true
          modifyOutputPath: false

      # Point to the directory; Azure DevOps will pick up any zip file inside it
      - publish: $(Build.ArtifactStagingDirectory)/Backend
        artifact: backend_pkg
        displayName: "Publish Artifact"

  - deployment: DeployToIIS
    dependsOn: Build
    environment:
      name: "Win16a"
      resourceName: "WIN16A"
      resourceType: virtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: backend_pkg

            - task: IISWebAppDeploymentOnMachineGroup@0
              inputs:
                WebSiteName: "TallyJv4-Backend-UAT"
                Package: "$(Pipeline.Workspace)/backend_pkg/Backend.zip"
                TakeAppOfflineFlag: true
