trigger:
  branches:
    include:
      - deploy
  paths:
    include:
      - backend/* # Only trigger if files in this folder change
    exclude:
      - frontend/* # Explicitly ignore frontend changes

pool:
  vmImage: "windows-latest"

variables:
  solution: "*.sln"
  buildPlatform: "Any CPU"
  buildConfiguration: "Release"

steps:
  - task: UseDotNet@2
    displayName: "Install .NET SDK from global.json"
    inputs:
      packageType: "sdk"
      useGlobalJson: true
      workingDirectory: "$(Build.SourcesDirectory)" # Point to where global.json lives

  - task: NuGetToolInstaller@1

  - task: NuGetCommand@2
    inputs:
      restoreSolution: "$(solution)"

  - task: VSBuild@1
    inputs:
      solution: "$(solution)"
      msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\WebApp.zip"'
      platform: "$(buildPlatform)"
      configuration: "$(buildConfiguration)"

  - task: VSTest@2
    inputs:
      platform: "$(buildPlatform)"
      configuration: "$(buildConfiguration)"

  - task: IISWebAppDeploymentOnMachineGroup@0
    inputs:
      WebSiteName: "TallyJv4-UAT"
      Package: '$(build.artifactStagingDirectory)\WebApp.zip'
      TakeAppOfflineFlag: true

  # THE DEBUG STEP
  - task: PublishPipelineArtifact@1
    displayName: "Debug: Check Workspace"
    condition: always()
    inputs:
      targetPath: "$(Build.SourcesDirectory)" # Only captures your code
      artifact: "BackendSourceDebug"
      publishLocation: "pipeline"
