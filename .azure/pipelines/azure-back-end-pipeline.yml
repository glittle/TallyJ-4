trigger:
  branches:
    include:
      - deploy
    exclude:
      - main # Explicitly ignore main
  paths:
    include:
      - backend/**
    exclude:
      - frontend/**

# 2. PR Trigger: Explicitly disabled to stop runs on PR creation/updates
pr: none

pool:
  vmImage: "windows-latest"

variables:
  solution: "*.sln"
  buildPlatform: "Any CPU"
  buildConfiguration: "Release"

steps:
  - task: UseDotNet@2
    displayName: "Install .NET SDK from global.json"
    inputs:
      packageType: "sdk"
      useGlobalJson: true
      workingDirectory: "$(Build.SourcesDirectory)" # Point to where global.json lives

  - task: NuGetToolInstaller@1

  - task: NuGetCommand@2
    inputs:
      restoreSolution: "$(solution)"

  - task: DotNetCoreCLI@2
    displayName: "Build and Package WebApp"
    inputs:
      command: "publish"
      publishWebProjects: true # or point to your specific csproj
      arguments: '--configuration $(buildConfiguration) --output "$(build.artifactStagingDirectory)"'
      zipAfterPublish: true

  - task: DotNetCoreCLI@2
    displayName: "Run Unit Tests"
    inputs:
      command: "test"
      projects: "**/*Tests/*.csproj"
      arguments: "--configuration $(buildConfiguration) --no-build --verbosity quiet" # --no-build saves time if you just built it

  - task: IISWebAppDeploymentOnMachineGroup@0
    inputs:
      WebSiteName: "TallyJv4-UAT"
      Package: '$(build.artifactStagingDirectory)\WebApp.zip'
      TakeAppOfflineFlag: true

