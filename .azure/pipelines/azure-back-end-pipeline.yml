trigger:
  branches:
    include: [deploy]
    exclude: [main]
  paths:
    include: [backend/**]
    exclude: [frontend/**]

pr: none

pool:
  vmImage: "windows-latest"

variables:
  buildConfiguration: "Release"

jobs:
  - job: Build
    steps:
      - task: UseDotNet@2
        displayName: "Install .NET SDK from global.json"
        inputs:
          packageType: "sdk"
          useGlobalJson: true
          workingDirectory: "$(Build.SourcesDirectory)"

      # 1. Run Tests (Quietly builds what it needs for testing)
      - task: DotNetCoreCLI@2
        displayName: "Run Unit Tests"
        inputs:
          command: "test"
          projects: "backend/**/*.csproj"
          arguments: "--configuration $(buildConfiguration) --verbosity quiet"

      # 2. Package Web Project (Removed --no-build to fix the missing manifest error)
      - task: DotNetCoreCLI@2
        displayName: "Package Web Project"
        inputs:
          command: "publish"
          projects: "backend/Backend/Backend.csproj"
          # Removed --no-build here so the Web SDK can generate its manifests
          arguments: '--configuration $(buildConfiguration) --output "$(Build.ArtifactStagingDirectory)"'
          zipAfterPublish: true
          modifyOutputPath: false

      - publish: $(Build.ArtifactStagingDirectory)/Backend.zip
        artifact: backend_pkg
        displayName: "Publish Artifact"

  - deployment: DeployToIIS
    dependsOn: Build
    environment:
      name: "Win16a"
      resourceName: "WIN16A"
      resourceType: virtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: backend_pkg

            - task: IISWebAppDeploymentOnMachineGroup@0
              inputs:
                WebSiteName: "TallyJv4-Backend-UAT"
                Package: "$(Pipeline.Workspace)/backend_pkg/Backend.zip"
                TakeAppOfflineFlag: true
